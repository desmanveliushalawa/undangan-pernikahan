      // =========================================================================
      // GEMINI API CALLER

      const callGeminiAPI = async (prompt, systemInstruction = "") => {
        const apiKey = ""; // Otomatis disuntikkan oleh sistem Canvas saat runtime
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: systemInstruction
            ? { parts: [{ text: systemInstruction }] }
            : undefined,
        };

        let delay = 1000;
        for (let attempt = 0; attempt < 3; attempt++) {
          try {
            const response = await fetch(apiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (response.ok) {
              const result = await response.json();
              return result.candidates?.[0]?.content?.parts?.[0]?.text || "";
            }

            if (response.status === 429) {
              await new Promise((resolve) => setTimeout(resolve, delay));
              delay *= 2;
            } else {
              throw new Error(`Koneksi API gagal: ${response.status}`);
            }
          } catch (error) {
            if (attempt === 2) {
              console.error("Gemini API Error setelah 3 percobaan:", error);
              throw error;
            }
            await new Promise((resolve) => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
        return "";
      };

      // =========================================================================
      // 🌸 SAKURA PARTICLE CANVAS COMPONENT
      // =========================================================================
      const SakuraCanvas = () => {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext("2d");
          let animationFrameId;

          const resizeCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          };
          window.addEventListener("resize", resizeCanvas);
          resizeCanvas();

          const petals = [];
          const maxPetals = 35;

          class Petal {
            constructor() {
              this.reset();
              this.y = Math.random() * canvas.height;
            }

            reset() {
              this.x = Math.random() * canvas.width;
              this.y = -20;
              this.size = Math.random() * 8 + 6;
              this.speedX = Math.random() * 1.5 - 0.5;
              this.speedY = Math.random() * 1.2 + 0.8;
              this.density = Math.random() * 30 + 10;
              this.opacity = Math.random() * 0.4 + 0.4;
              this.rotation = Math.random() * 360;
              this.rotationSpeed = Math.random() * 1.5 - 0.75;
              const colors = [
                `rgba(244, 197, 200, ${this.opacity})`,
                `rgba(255, 228, 230, ${this.opacity})`,
                `rgba(255, 255, 255, ${this.opacity * 0.8})`,
              ];
              this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            draw() {
              ctx.save();
              ctx.translate(this.x, this.y);
              ctx.rotate((this.rotation * Math.PI) / 180);
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.bezierCurveTo(
                -this.size,
                -this.size,
                -this.size,
                this.size,
                0,
                this.size * 1.4,
              );
              ctx.bezierCurveTo(
                this.size,
                this.size,
                this.size,
                -this.size,
                0,
                0,
              );
              ctx.fillStyle = this.color;
              ctx.fill();
              ctx.restore();
            }

            update() {
              this.x += this.speedX + Math.sin(this.y / this.density) * 0.5;
              this.y += this.speedY;
              this.rotation += this.rotationSpeed;

              if (
                this.y > canvas.height + 20 ||
                this.x > canvas.width + 20 ||
                this.x < -20
              ) {
                this.reset();
              }
            }
          }

          for (let i = 0; i < maxPetals; i++) {
            petals.push(new Petal());
          }

          const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach((petal) => {
              petal.update();
              petal.draw();
            });
            animationFrameId = requestAnimationFrame(animate);
          };
          animate();

          return () => {
            window.removeEventListener("resize", resizeCanvas);
            cancelAnimationFrame(animationFrameId);
          };
        }, []);

        return (
          <canvas
            ref={canvasRef}
            className="fixed inset-0 pointer-events-none z-10"
          />
        );
      };

      // =========================================================================

      const ScrollReveal = ({ children, delay = 0 }) => {
        const [isVisible, setIsVisible] = useState(false);
        const ref = useRef(null);

        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setIsVisible(true);
                observer.unobserve(entry.target);
              }
            },
            { threshold: 0.1 },
          );
          if (ref.current) {
            observer.observe(ref.current);
          }
          return () => {
            if (ref.current) observer.unobserve(ref.current);
          };
        }, []);

        return (
          <div
            ref={ref}
            style={{ transitionDelay: `${delay}ms` }}
            className={`transition-all duration-1000 ease-out transform ${
              isVisible
                ? "opacity-100 translate-y-0 scale-100"
                : "opacity-0 translate-y-12 scale-95"
            }`}
          >
            {children}
          </div>
        );
      };

                    Prewedding Galeri

                      >
                        <img
                          src={photo.url}
                          alt={`Prewedding ${index}`}
                          className="w-full h-full object-cover"
                        />
                        <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-6 text-white text-center">
                          <p className="text-xs font-serif-lux italic tracking-wide text-[#F5E6D3] leading-relaxed">
                            "{photo.caption}"
                          </p>
                        </div>
                      </div>
                    ))}

                    <div className="absolute bottom-16 left-1/2 transform -translate-x-1/2 z-20 flex gap-2">
                      {carouselPhotos.map((_, idx) => (
                        <button
                          key={idx}
                          onClick={() => setCurrentSlide(idx)}
                          className={`w-2 h-2 rounded-full transition-all duration-300 ${
                            idx === currentSlide
                              ? "bg-[#C9A84C] w-6"
                              : "bg-white/50"
                          }`}
                        />
                      ))}
                    </div>
                  </div>
                </ScrollReveal>
              </div>
            </section>

            {}
            {/* LOVE STORY */}
            <section className="py-24 px-6 bg-[#FDF6ED] relative">
              <div className="max-w-xl mx-auto">
                <ScrollReveal>
                  <div className="text-center mb-16">
                    <h2 className="text-3xl sm:text-4xl font-serif-lux text-[#2C1B1D] font-light">
                      Kisah Kasih Kita
                    </h2>
                    <p className="text-xs text-gray-500 tracking-widest uppercase mt-2">
                      Perjalanan Indah Dituntun Tuhan
                    </p>
                    <DiamondDivider />
                  </div>
                </ScrollReveal>

                <div className="space-y-10 relative">
                  <div className="absolute left-6 md:left-1/2 top-2 bottom-2 w-[1px] bg-gradient-to-b from-transparent via-[#C9A84C] to-transparent"></div>

                  <ScrollReveal delay={100}>
                    <div className="relative flex flex-col md:flex-row gap-6 md:gap-12 items-start md:items-center">
                      <div className="absolute left-6 md:left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full bg-white border-2 border-[#C9A84C] z-10 flex items-center justify-center">
                        <div className="w-1.5 h-1.5 rounded-full bg-[#C9A84C]"></div>
                      </div>
                      <div className="pl-14 md:pl-0 md:w-1/2 md:text-right bg-white p-6 rounded-2xl shadow-sm border border-[#E8C5C8]/30">
                        <span className="inline-block bg-[#E8C5C8]/40 text-[#2C1B1D] px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase mb-3">
                          Pertemuan
                        </span>
                        <p className="text-xs italic text-gray-600 leading-relaxed font-light font-serif-lux">
                          "Seperti aliran sungai yang tenang namun pasti
                          menemukan muaranya, begitulah semesta menuntun
                          langkahku untuk menemukanmu. Di antara miliaran detik
                          waktu bergulir, Tuhan menuliskan bab baru yang paling
                          indah: kita."
                        </p>
                      </div>
                    </div>
                  </ScrollReveal>

                  <ScrollReveal delay={200}>
                    <div className="relative flex flex-col md:flex-row-reverse gap-6 md:gap-12 items-start md:items-center">
                      <div className="absolute left-6 md:left-1/2 transform -translate-x-1/2 w-4 h-4 rounded-full bg-white border-2 border-[#C9A84C] z-10 flex items-center justify-center">
                        <div className="w-1.5 h-1.5 rounded-full bg-[#C9A84C]"></div>
                      </div>
                      <div className="pl-14 md:pl-0 md:w-1/2 bg-white p-6 rounded-2xl shadow-sm border border-[#E8C5C8]/30">
                        <span className="inline-block bg-[#E8C5C8]/40 text-[#2C1B1D] px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase mb-3">
                          Janji Suci
                        </span>
                        <p className="text-xs italic text-gray-600 leading-relaxed font-light font-serif-lux">
                          "Bukan tentang siapa yang tercepat datang, tapi siapa
                          yang paling setia menetap seumur hidup. Di bawah
                          kebaikan Tuhan (Goodness of God), kami mantap
                          melangkah untuk dipersatukan dalam ikatan suci
                          pernikahan."
                        </p>
                      </div>
                    </div>
                  </ScrollReveal>
                </div>
              </div>
            </section>

            {/* EVENT CALENDAR */}
            <section className="py-24 px-6 bg-[#2C1B1D] text-white text-center relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-[#1C1012] to-[#2C1B1D] opacity-90 z-0"></div>
              <div className="relative z-10 max-w-lg mx-auto">
                <ScrollReveal>
                  <Icons.Calendar
                    className="mx-auto mb-4 text-[#C9A84C]"
                    size={36}
                  />
                  <h2 className="text-3xl font-serif-lux mb-2 text-[#F5E6D3] font-light">
                    Rangkaian Acara
                  </h2>
                  <p className="text-xs tracking-widest text-gray-300 uppercase">
                    Save the Date & Location
                  </p>
                  <DiamondDivider />
                </ScrollReveal>

                <ScrollReveal delay={100}>
                  <div className="bg-white/5 backdrop-blur-md rounded-3xl p-8 border border-white/10 shadow-2xl relative overflow-hidden">
                    <h3 className="text-2xl font-serif-lux mb-2 text-[#C9A84C]">
                      Pemberkatan & Resepsi
                    </h3>
                    <p className="text-xs opacity-80 mb-6 tracking-wide">
                      Kamis, 20 Agustus 2026 • 08:00 WIB - Selesai
                    </p>
                    <div className="mb-8 space-y-1">
                      <p className="text-sm font-semibold text-[#F5E6D3]">
                        Desa Hiliadulo, Kec. Hilisalawa'ahe
                      </p>
                      <p className="text-xs opacity-70">
                        Kabupaten Nias Selatan
                      </p>
                    </div>
                    <a
                      href="https://www.google.com/maps/search/Desa+Hiliadulo+Hilisalawa'ahe"

                      rel="noopener noreferrer"
                      className="inline-flex items-center gap-2 bg-gradient-to-r from-[#DFBA5E] via-[#C9A84C] to-[#E5C169] text-[#2C1B1D] px-8 py-3 rounded-full text-xs font-bold shadow-lg uppercase tracking-wider"
                    >
                      <Icons.MapPin size={14} /> Lihat Lokasi Maps
                    </a>
                  </div>
                </ScrollReveal>
              </div>
            </section>

            {}
            {/* RSVP SECTION */}

                <div className="text-center mb-10">
                  <h2 className="text-3xl font-serif-lux mb-2 text-[#2C1B1D] font-light">
                    Konfirmasi Kehadiran
                  </h2>
                  <p className="text-xs text-gray-500 font-light">
                    Mohon kesediaan Anda untuk mengonfirmasi kehadiran Anda di
                    Google Sheets kami
                  </p>
                  <DiamondDivider />
                </div>
              </ScrollReveal>

              <ScrollReveal delay={100}>
                <form className="space-y-4" onSubmit={submitRSVP}>
                  <div>
                    <label className="block text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1 text-gray-500">
                      Nama Lengkap
                    </label>
                    <input
                      type="text"
                      value={rsvpData.name}
                      onChange={(e) =>
                        setRsvpData({ ...rsvpData, name: e.target.value })
                      }
                      className="w-full bg-[#FDF6ED] border-none rounded-2xl p-4 outline-none text-xs text-[#564244] shadow-inner"
                      placeholder="Masukkan nama Anda"
                      required
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1 text-gray-500">
                        Kehadiran
                      </label>
                      <select
                        value={rsvpData.attendance}
                        onChange={(e) =>
                          setRsvpData({
                            ...rsvpData,
                            attendance: e.target.value,
                          })
                        }
                        className="w-full bg-[#FDF6ED] border-none rounded-2xl p-4 outline-none text-xs text-[#564244] cursor-pointer shadow-inner"
                      >
                        <option>Hadir</option>
                        <option>Tidak Dapat Hadir</option>
                        <option>Masih Ragu</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1 text-gray-500">
                        Jumlah Tamu
                      </label>
                      <select
                        value={rsvpData.guests}
                        onChange={(e) =>
                          setRsvpData({ ...rsvpData, guests: e.target.value })
                        }
                        className="w-full bg-[#FDF6ED] border-none rounded-2xl p-4 outline-none text-xs text-[#564244] cursor-pointer shadow-inner"
                      >
                        <option>1 Orang</option>
                        <option>2 Orang</option>
                        <option>3 Orang</option>
                      </select>
                    </div>
                  </div>

                  <button
                    type="submit"
                    disabled={isSubmittingRsvp}
                    className="w-full bg-gradient-to-r from-[#DFBA5E] via-[#C9A84C] to-[#E5C169] text-[#2C1B1D] py-4 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 uppercase tracking-wider text-xs"
                  >
                    {isSubmittingRsvp ? (
                      <>
                        <Icons.Loader2 size={18} /> Menyimpan...
                      </>
                    ) : (
                      <>
                        <Icons.Send size={14} /> Kirim Konfirmasi
                      </>
                    )}
                  </button>
                </form>
              </ScrollReveal>
            </section>

            {/* BOOK OF GUESTS */}
            <section className="py-24 px-6 bg-[#FDF6ED]">
              <div className="max-w-2xl mx-auto">
                <ScrollReveal>
                  <div className="text-center mb-10">
                    <Icons.MessageSquare
                      className="mx-auto mb-4 text-[#C9A84C]"
                      size={28}
                    />
                    <h2 className="text-3xl font-serif-lux mb-2 font-light text-[#2C1B1D]">
                      Buku Tamu
                    </h2>
                    <p className="text-xs text-gray-500 font-light">
                      Tinggalkan doa restu terbaik Anda untuk kedua mempelai
                    </p>
                    <DiamondDivider />
                  </div>
                </ScrollReveal>

                <ScrollReveal delay={100}>
                  <div className="bg-white p-6 rounded-3xl shadow-lg mb-8 border border-[#E8C5C8]/30 relative overflow-hidden">
                    <input
                      type="text"
                      value={newComment.name}
                      onChange={(e) =>
                        setNewComment({ ...newComment, name: e.target.value })
                      }
                      className="w-full bg-[#FFFBF7] border-none rounded-xl p-3.5 mb-3 outline-none text-xs text-[#564244] shadow-inner"
                      placeholder="Nama Anda"
                    />

                    <div className="mb-3 flex justify-end">
                      <button
                        type="button"
                        onClick={() => setShowAiWishPanel(!showAiWishPanel)}
                        className="inline-flex items-center gap-1.5 text-[11px] text-[#2C1B1D] font-bold bg-[#FFFBF7] px-3.5 py-2 rounded-xl border border-[#C9A84C]/50 shadow-sm"
                      >
                        <Icons.Sparkles
                          size={13}
                          className="animate-pulse text-[#C9A84C]"
                        />
                        <span>Bantu Tulis Ucapan dengan AI</span>
                      </button>
                    </div>

                    {showAiWishPanel && (
                      <div className="mb-4 bg-[#FFFBF7] rounded-2xl p-4 border border-[#C9A84C]/35 space-y-3 animate-slideDown">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider mb-1 text-gray-500">
                              Hubungan Anda
                            </label>
                            <select
                              value={aiRelationship}
                              onChange={(e) =>
                                setAiRelationship(e.target.value)
                              }
                              className="w-full text-xs p-2.5 rounded-xl border border-gray-200 outline-none focus:border-[#C9A84C] bg-white"
                            >
                              <option>Teman Dekat</option>
                              <option>Rekan Kerja</option>
                              <option>Keluarga Besar</option>
                              <option>Sahabat Kecil</option>
                              <option>Tetangga</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold uppercase tracking-wider mb-1 text-gray-500">
                              Gaya Bahasa Ucapan
                            </label>
                            <select
                              value={aiTone}
                              onChange={(e) => setAiTone(e.target.value)}
                              className="w-full text-xs p-2.5 rounded-xl border border-gray-200 outline-none focus:border-[#C9A84C] bg-white"
                            >
                              <option>Penuh Doa & Harapan</option>
                              <option>Santai & Lucu</option>
                              <option>Sangat Romantis & Estetik</option>
                              <option>Formal & Berwibawa</option>
                            </select>
                          </div>
                        </div>

                        <button
                          type="button"
                          onClick={handleGenerateAiWish}
                          disabled={isGeneratingWish}
                          className="w-full bg-[#2C1B1D] text-white hover:bg-[#422D30] text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-2"
                        >
                          {isGeneratingWish ? (
                            <>
                              <Icons.Loader2
                                size={13}
                                className="text-[#C9A84C]"
                              />
                              <span>Sedang Meramu Ucapan Indah...</span>
                            </>
                          ) : (
                            <>
                              <Icons.Sparkles size={13} />
                              <span>Hasilkan Ucapan Otomatis</span>
                            </>
                          )}
                        </button>
                      </div>
                    )}

                    <textarea
                      value={newComment.message}
                      onChange={(e) =>
                        setNewComment({
                          ...newComment,
                          message: e.target.value,
                        })
                      }
                      className="w-full bg-[#FFFBF7] border-none rounded-xl p-4 mb-4 outline-none resize-none text-xs text-[#564244] shadow-inner"
                      placeholder="Tulis ucapan atau gunakan asisten AI di atas..."
                      rows={4}
                    />

                    <button
                      onClick={submitComment}
                      disabled={isSubmittingComment}
                      className="bg-[#2C1B1D] text-[#FFFBF7] px-8 py-3 rounded-full text-xs font-bold hover:bg-[#422D30] shadow-md flex items-center gap-2 disabled:opacity-50 uppercase tracking-wider"
                    >
                      {isSubmittingComment ? (
                        <>
                          <Icons.Loader2 size={14} /> Mengirim...
                        </>
                      ) : (
                        "Kirim Ucapan"
                      )}
                    </button>
                  </div>
                </ScrollReveal>

                <ScrollReveal delay={200}>
                  <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    {isLoadingComments ? (
                      <div className="flex flex-col items-center justify-center py-10 text-gray-400 gap-2">
                        <Icons.Loader2 size={24} className="text-[#C9A84C]" />
                        <span className="text-xs">Memuat ucapan...</span>
                      </div>
                    ) : guestBook.length > 0 ? (
                      guestBook.map((msg, i) => (
                        <div
                          key={i}
                          className="bg-white/80 backdrop-blur-sm p-5 rounded-2xl border border-white flex flex-col gap-1 shadow-sm relative overflow-hidden group"
                        >
                          <div className="absolute top-0 left-0 w-[4px] h-full bg-[#C9A84C]"></div>
                          <p className="font-bold text-sm text-[#2C1B1D] font-serif-lux">
                            {msg.name}
                          </p>
                          <p className="text-xs font-light text-[#564244] leading-relaxed font-serif-lux italic">
                            "{msg.message}"
                          </p>
                          <p className="text-[9px] text-gray-400 mt-1.5 uppercase tracking-tighter">
                            {msg.date}
                          </p>
                        </div>
                      ))
                    ) : (
                      <p className="text-center text-xs text-gray-400 py-10">
                        Belum ada ucapan. Jadilah yang pertama memberikan doa
                        restu!
                      </p>
                    )}
                  </div>
                </ScrollReveal>
              </div>
            </section>

            {/* WEDDING GIFT SECTION */}
            <section className="py-24 px-6 text-center bg-[#FFFBF7]">
              <ScrollReveal>
                <Icons.Gift className="mx-auto mb-6 text-[#C9A84C]" size={32} />
                <h2 className="text-3xl font-serif-lux mb-4 text-[#2C1B1D] font-light">
                  Tanda Kasih
                </h2>
                <p className="text-xs font-light max-w-sm mx-auto mb-10 text-gray-500 leading-relaxed">
                  Doa restu Anda adalah karunia terindah, namun jika ingin
                  memberikan tanda kasih, Anda dapat menyalurkannya melalui:
                </p>
              </ScrollReveal>

              <ScrollReveal delay={100}>
                <div className="max-w-xs mx-auto bg-[#FDF6ED] p-8 rounded-3xl shadow-xl border border-[#E8C5C8]/40 relative overflow-hidden group hover:shadow-2xl transition-all">
                  <div className="absolute top-0 left-0 w-2.5 h-full bg-gradient-to-b from-[#DFBA5E] to-[#C9A84C]"></div>
                  <p className="text-left font-bold text-md text-gray-700 mb-1">
                    Bank Mandiri
                  </p>
                  <p className="text-left text-xs text-gray-400 mb-6">
                    A.N Hendry Susanto Halawa
                  </p>

                  <div className="flex items-center justify-between bg-white/90 p-3.5 rounded-2xl border border-[#E8C5C8]/45 shadow-inner">
                    <span className="font-mono font-bold tracking-wider text-[#2C1B1D] text-sm">
                      1234567890
                    </span>
                    <button
                      onClick={() => copyToClipboard("1234567890")}
                      className="text-[#C9A84C] hover:scale-110 active:scale-90 p-1"
                    >
                      <Icons.Copy size={16} />
                    </button>
                  </div>
                  {copied && (
                    <span className="text-[10px] text-green-600 mt-2.5 block animate-pulse font-medium">
                      Berhasil disalin!
                    </span>
                  )}
                </div>
              </ScrollReveal>
            </section>

            {/* FOOTER */}
            <footer className="py-16 bg-[#2C1B1D] text-center px-6 relative overflow-hidden border-t-2 border-[#C9A84C]/25">
              <div className="absolute inset-0 opacity-5">
                <img
                  src={COVER_BG_URL}
                  alt="bg pattern"
                  className="w-full h-full object-cover"
                />
              </div>

              <div className="relative z-10">
                <p className="text-lg tracking-[0.3em] uppercase font-light font-serif-lux text-[#C9A84C]">
                  Hendry & Nesra
                </p>
                <div className="w-12 h-[1px] bg-[#C9A84C]/30 mx-auto my-3"></div>
                <p className="text-[10px] mt-2 text-[#E8C5C8] font-light tracking-wider">
                  © 2026 Wedding Invitation • Powered by Google Sheets & Gemini
                  AI
                </p>
              </div>
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
